<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>산업기사 주관식 마스터</title>
    <link rel="stylesheet" href="../통합랜덤.css">
    <link rel="stylesheet" href="주관식통합.css">
</head>
<body class="light-mode" id="main-body" onclick="handleFirstClickFullScreen()">

    <nav class="top-nav no-drag">
        <div class="nav-inner">
            <h1 id="main-title" onclick="handleTitleClick()">◀ 산업기사 <small style="font-size:0.85em;opacity:0.9;">주관식</small></h1>
            <div class="nav-right subj-nav-tools">
                <label class="st-switch subj-top-left-hand" id="subj-left-hand-wrap">
                    <input type="checkbox" id="setting-left-hand" onchange="applyLeftHand(this.checked)">
                    <span class="slider"></span><span class="lbl-txt">왼손</span>
                </label>
                <button id="theme-btn" class="btn-icon-theme" onclick="toggleTheme()">🌙 다크</button>
            </div>
        </div>
    </nav>

    <main class="container subj-container">
        <section id="home-screen" class="active-screen">

            <div class="main-sticky-wrapper">

                <div class="banner-flex-row no-drag">
                    <div class="dashboard glass-card">
                        <div class="stat-container">
                            <div class="stat-row">
                                <div class="stat-pill">최근: <strong id="stat-last">0</strong>점</div>
                                <div class="stat-pill">평균: <strong id="stat-avg">0</strong>점</div>
                            </div>
                            <div class="dashboard-btns">
                                <button class="btn-open-chart" onclick="openStatsModal()">성적통계</button>
                            </div>
                        </div>
                    </div>

                    <div class="settings-panel-slim glass-card">
                        <div class="settings-flex">
                            <div class="setting-item-mini">
                                <label class="st-switch">
                                    <input type="checkbox" id="setting-mode-self" checked onchange="syncExamMode('self', this)">
                                    <span class="slider"></span><span class="lbl-txt">스스로 판단</span>
                                </label>
                            </div>
                            <div class="setting-item-mini">
                                <label class="st-switch">
                                    <input type="checkbox" id="setting-mode-input" onchange="syncExamMode('input', this)">
                                    <span class="slider"></span><span class="lbl-txt">직접 입력</span>
                                </label>
                            </div>
                            <div class="setting-item-mini home-desktop-only">
                                <label class="st-switch">
                                    <input type="checkbox" id="multi-mode-chk-desktop" onchange="syncMultiModeCheckbox(this)">
                                    <span class="slider"></span><span class="lbl-txt">선택랜덤</span>
                                </label>
                            </div>
                            <button id="btn-multi-start" type="button" class="hidden home-desktop-only" onclick="startExam('multi')">선택 회차<br>80문제 시작</button>
                        </div>
                    </div>
                </div>

                <input type="checkbox" id="multi-mode-chk" class="visually-hidden" onchange="toggleMultiMode()">

                <div class="home-action-row no-drag">
                    <button type="button" class="home-action-btn home-action-full" onclick="startExam('full')">전체범위 랜덤 풀기</button>
                    <button type="button" id="btn-home-select" class="home-action-btn home-action-select" onclick="handleSelectRandomAction()">선택 랜덤풀기</button>
                    <button type="button" id="btn-home-wrong" class="home-action-btn home-action-wrong" onclick="toggleWrongAccordion()">회차별 오답 기록</button>
                </div>

                <div class="main-action-independent no-drag home-desktop-only">
                    <button class="btn-unified-action blue-style" onclick="startExam('full')">🎲 전체 범위 랜덤 풀기 (80문항)</button>
                </div>

                <div class="wrong-note-section glass-card no-drag">
                    <div class="accordion-trigger home-desktop-only" onclick="toggleWrongAccordion()">
                        <span>📕 회차별 오답 기록</span>
                        <span id="wrong-arrow-icon">▼</span>
                    </div>
                    <div id="wrong-content-area" class="accordion-body hidden">
                        <div class="wrong-header-btns">
                            <button onclick="clearAllWrongs()" class="btn-danger-mini">전체 오답 초기화</button>
                            <button id="btn-wrong-multi-start" class="btn-wrong-multi hidden" onclick="startMultiWrongReview()">🚀 선택 회차 모아풀기</button>
                        </div>
                        <div class="wrong-scroll-container">
                            <div id="wrong-list-display"></div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="home-round-zone no-drag">
                <p id="round-select-hint" class="round-select-hint hidden" aria-live="polite">아래 회차를 탭하여 선택하세요</p>
                <div id="round-grid-display" class="round-card-grid"></div>
            </div>

        </section>

        <section id="quiz-screen" class="hidden">
            <nav class="quiz-nav subj-quiz-nav">
                <div class="nav-row-top">
                    <button class="btn-nav-small" onclick="goBackToMain()">🏠 홈으로</button>
                    <strong class="nav-title">주관식 문제</strong>
                    <button onclick="toggleFontControl()" class="btn-nav-small">⚙️ 글자크기</button>
                </div>
                <div class="nav-row-bottom">
                    <div id="progress-display">문항: 0 / 0</div>
                    <div id="timer-display">60:00</div>
                    <button class="btn-nav-small btn-nav-green" onclick="confirmFinalize()">📊 바로 제출</button>
                </div>
            </nav>
            <div id="quiz-display-area"></div>
        </section>

        <section id="result-screen" class="hidden">
            <div class="result-sticky-nav">
                <div class="result-nav-content">
                    <div class="result-score-mini">
                        <span id="final-result-score">0</span><small>점</small>
                    </div>
                    <div class="result-btn-group">
                        <button type="button" onclick="event.preventDefault(); retryCurrentExam(false);" class="btn-res-nav">다시 풀기</button>
                        <button type="button" onclick="event.preventDefault(); retryCurrentExam(true);" class="btn-res-nav btn-red">틀린 것만</button>
                        <button type="button" onclick="event.preventDefault(); goBackToMain();" class="btn-res-nav btn-gray">메인으로</button>
                    </div>
                </div>
            </div>
            <div id="review-list-container" class="review-scroll-area"></div>
        </section>
    </main>

    <div id="modal-stats-overlay" class="modal-overlay hidden no-drag" onclick="handleOverlayClick(event)">
        <div class="modal-window glass-card" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="stat-chart-title" onclick="handleSecretReset(event)">📊 나의 성적 변화 추이</h3>
                <button class="btn-close-modal" onclick="closeStatsModal()">&times;</button>
            </div>
            <div class="chart-wrapper" id="chart-scroll-box">
                <div id="chart-canvas-area"></div>
            </div>
            <p class="chart-desc">위쪽이 최근 성적입니다.</p>
        </div>
    </div>

    <div id="font-control-banner" class="modal-banner hidden">
        <div class="banner-body glass-card">
            <h4>글자 크기 정밀 설정</h4>
            <div class="control-item">
                <label>문제 크기: <span id="val-q-size">1.2</span>rem</label>
                <input type="range" id="slider-q-size" min="0.8" max="2.5" step="0.1" oninput="updateFontSize('q', this.value)">
            </div>
            <div class="control-item" style="margin-top:20px;">
                <label>해설/답변 크기: <span id="val-exp-size">1.0</span>rem</label>
                <input type="range" id="slider-exp-size" min="0.8" max="2.5" step="0.1" oninput="updateFontSize('exp', this.value)">
            </div>
            <button onclick="toggleFontControl()" class="btn-primary" style="margin-top:20px;">설정 완료</button>
        </div>
    </div>

    <div id="confirm-banner" class="modal-overlay hidden">
        <div class="confirm-modal-window glass-card">
            <div class="banner-body">
                <p style="text-align: center; line-height: 1.6; margin-bottom: 25px; font-weight: 700; font-size: 1.1rem; color: var(--text-primary);">
                    안내 메시지
                </p>
                <div class="banner-footer-btns">
                    <button class="btn-banner-close" onclick="closeConfirmBanner()">취소</button>
                    <button class="btn-banner-submit">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script src="주관식문제.js"></script>
    <script type="module" src="주관식통합.js"></script>
</body>
</html>
