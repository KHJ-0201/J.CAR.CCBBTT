<script>
    (function() {
        const redirectPath = 'lock.html';

        function isLocalDevHost() {
            const h = window.location.hostname;
            if (h === '127.0.0.1' || h === 'localhost' || h === '[::1]') return true;
            if (/^192\.168\.\d{1,3}\.\d{1,3}$/.test(h)) return true;
            if (/^10\.\d{1,3}\.\d{1,3}\.\d{1,3}$/.test(h)) return true;
            if (/^172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}$/.test(h)) return true;
            return false;
        }

        function isTeacherAdminSession() {
            return (localStorage.getItem('studentName') || '').trim() === '김회준'
                && localStorage.getItem('reserved_name_kimhj_verified') === '1';
        }

        const isLocalDev = isLocalDevHost();
        const skipAntiDebug = isLocalDev || isTeacherAdminSession();

        // [보안 1] 출입증 확인
        if (sessionStorage.getItem('auth_status') !== 'verified') {
            window.location.replace(redirectPath);
            return;
        }

        // [보안 5] 최종 외곽 방어선 (2번 창 -> 완전 종료)
        if (!history.state || history.state.page !== 'subject_select') {
            window.history.pushState({ page: 'subject_select' }, "", window.location.href);
        }
        window.addEventListener('popstate', function(event) {
            if (confirm("CBT 시스템을 완전히 종료하시겠습니까?")) {
                window.location.replace(redirectPath);
            } else {
                window.history.pushState({ page: 'subject_select' }, "", window.location.href);
            }
        });

        // Go Live / 로컬·교사 관리자 세션에서는 개발자도구 감시 비활성화
        if (skipAntiDebug) {
            console.log('🛠️ [정비 모드] 로컬/교사 관리자 세션 — 개발자도구 감시를 일시 정지합니다.');
            return;
        }

        // [보안 2] 정밀 추방 로직
        const evict = () => window.location.replace(redirectPath);

        // [보안 3] 메인 감시 엔진 (0.2초마다 순찰)
        setInterval(function() {
            const start = Date.now();
            debugger;
            const end = Date.now();
            if (end - start > 100) {
                evict();
            }
        }, 200);

        // [보안 4] 단축키 및 우클릭 원천 차단
        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73, 74].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault();
                evict();
            }
        });
    })();
</script>
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>CBT 자격증 선택</title>
<link rel="stylesheet" href="01자격증선택.css">
</head>
<body>

<div id="teacher-admin-bar" class="teacher-admin-bar hidden">
  <button type="button" id="btn-go-admin" class="teacher-admin-btn" title="관리자 화면">
    <span class="teacher-admin-icon" aria-hidden="true">⚙</span>
    <span class="teacher-admin-label">관리자</span>
  </button>
</div>

<div id="pageContent">
  <h1>CBT 자격증 선택</h1>

  <div class="random-wrapper industry-master-wrap" id="industry-master-wrap">
    <div class="round-card random-card industry-master-trigger" id="industry-master-trigger" role="button" tabindex="0">
      과정형평가 산업기사 필기
    </div>
    <div class="industry-type-choice" id="industry-type-choice" aria-hidden="true">
      <button type="button" class="round-card industry-type-btn industry-type-objective" data-href="문제모음/통합랜덤.html?cert=01">객관식</button>
      <button type="button" class="round-card industry-type-btn industry-type-subjective" data-href="문제모음/01자동차정비산업기사/주관식통합.html">주관식</button>
    </div>
  </div>

  <div class="round-container">
    <div class="round-card" onclick="window.location.href='문제모음/통합랜덤.html?cert=02'">자동차 정비기능사 필기</div>
    <div class="round-card" onclick="window.location.href='문제모음/통합랜덤.html?cert=03'">자동차 차체수리기능사 필기</div>
    <div class="round-card" onclick="window.location.href='문제모음/통합랜덤.html?cert=04'">자동차 보수도장기능사 필기</div>
    <div class="round-card" onclick="window.location.href='문제모음/통합랜덤.html?cert=05'">자동차 진단평가사 필기</div>
    <div class="round-card" onclick="window.location.href='문제모음/통합랜덤.html?cert=06'">EV 진단사 필기</div>
  </div>
</div>

<script>
(function () {
  var wrap = document.getElementById('industry-master-wrap');
  var trigger = document.getElementById('industry-master-trigger');
  var choice = document.getElementById('industry-type-choice');

  function setExpanded(expanded) {
    wrap.classList.toggle('expanded', expanded);
    choice.setAttribute('aria-hidden', expanded ? 'false' : 'true');
  }

  trigger.addEventListener('click', function () {
    setExpanded(!wrap.classList.contains('expanded'));
  });

  trigger.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    e.preventDefault();
    trigger.click();
  });

  choice.querySelectorAll('.industry-type-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      window.location.href = btn.getAttribute('data-href');
    });
  });

  document.addEventListener('click', function (e) {
    if (!wrap.classList.contains('expanded')) return;
    if (!wrap.contains(e.target)) setExpanded(false);
  });
})();

(function () {
  var RESERVED_ADMIN_NAME = '김회준';
  var VERIFY_KEY = 'reserved_name_kimhj_verified';

  function isTeacherAdminUser() {
    return (localStorage.getItem('studentName') || '').trim() === RESERVED_ADMIN_NAME
      && localStorage.getItem(VERIFY_KEY) === '1';
  }

  if (!isTeacherAdminUser()) return;

  var bar = document.getElementById('teacher-admin-bar');
  var btn = document.getElementById('btn-go-admin');
  if (!bar || !btn) return;

  bar.classList.remove('hidden');
  btn.addEventListener('click', function () {
    sessionStorage.setItem('admin_auth', 'granted');
    var url = new URL(window.location.href);
    var path = url.pathname;
    if (/\/start\/[^/]*$/.test(path)) {
      url.pathname = path.replace(/\/start\/[^/]*$/, '/admin.html');
    } else {
      url.pathname = path.replace(/\/[^/]*$/, '/admin.html');
    }
    window.location.replace(url.href);
  });
})();
</script>

</body>
</html>
